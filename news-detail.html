<<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News | Mitweg</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Playfair+Display:italic,wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #f5f5f4;
        --text-color: #333333;
        --accent-color: #8c8c8c;
        --font-main: "Noto Sans JP", sans-serif;
        --font-accent: "Playfair Display", serif;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-main);
        line-height: 1.8;
        margin: 0;
      }
      /* --- Header --- */
      /* --- Header Style (Image Logo Version) --- */
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(245, 245, 244, 0.8);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.03);
      }

      .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 15px 5%;
        display: flex;
        justify-content: flex-start; /* 左寄せ */
        align-items: center;
      }

      .header-logo {
        display: flex;
        align-items: center;
        text-decoration: none;
        transition: opacity 0.3s;
      }

      .header-logo img {
        height: 55px; /* ここでロゴの大きさを調整してね！ */
        width: auto; /* 横幅は自動で比率を維持 */
        display: block;
      }

      .header-logo:hover {
        opacity: 0.6;
      }

      /* スマホではロゴを少し小さくする */
      @media (max-width: 768px) {
        .header-logo img {
          height: 32px;
        }
      }
      main {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 5%;
      }
      #news-content h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
      }
      #news-date {
        font-size: 0.9rem;
        color: var(--accent-color);
        margin-bottom: 40px;
      }
      #news-body img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        margin: 20px 0;
      }
      .back-link {
        display: inline-block;
        margin-top: 60px;
        color: var(--text-color);
        text-decoration: none;
        border-bottom: 1px solid var(--text-color);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="header-logo">
          <img src="img/logo.png" alt="Mitweg" />
        </a>

        <nav class="header-nav"></nav>
      </div>
    </header>
    <main>
      <div id="news-content">
        <p id="loading">読み込み中...</p>
      </div>
      <a href="index.html" class="back-link">← Back to Home</a>
    </main>

    <script>
      // --- ここにあなたのAPIキーを入れてね ---
      const API_KEY = "x0WcTZuuVrtvUyRHjtRLLDcH80Uw9JDzRMg6"; // ここだけ自分のキーをコピペ！

      async function getNewsDetail() {
        const params = new URLSearchParams(window.location.search);
        const contentId = params.get("id");

        if (!contentId) {
          document.getElementById("news-content").innerHTML =
            "<p>記事が見つかりません（IDなし）。</p>";
          return;
        }

        try {
          // URLを直接書き込むスタイルに変更！(SERVICE_IDを使わない)
          // https:// の後にあなたのサービスID（mitweg）を直接入れてね
          const res = await fetch(
            `https://mitweg.microcms.io/api/v1/news/${contentId}`,
            {
              headers: { "X-MICROCMS-API-KEY": API_KEY },
            },
          );

          if (!res.ok) throw new Error("Network response was not ok");

          const post = await res.json();

          document.getElementById("news-content").innerHTML = `
                <p id="news-date">${new Date(post.publishedAt).toLocaleDateString()}</p>
                <h1>${post.title}</h1>
                <div id="news-body">${post.content}</div>
            `;
        } catch (error) {
          console.error(error);
          document.getElementById("news-content").innerHTML =
            "<p>エラーが発生しました。設定を確認してください。</p>";
        }
      }

      getNewsDetail();
    </script>
  </body>
</html>
