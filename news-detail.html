<<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News | Mitweg</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Playfair+Display:italic,wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #f5f5f4;
        --text-color: #333333;
        --accent-color: #8c8c8c;
        --font-main: "Noto Sans JP", sans-serif;
        --font-accent: "Playfair Display", serif;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-main);
        line-height: 1.8;
        margin: 0;
      }
      header {
        padding: 20px 5%;
        background: rgba(245, 245, 244, 0.8);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
      }
      .header-logo {
        font-family: var(--font-accent);
        font-size: 1.5rem;
        text-decoration: none;
        color: var(--text-color);
      }
      main {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 5%;
      }
      #news-content h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
      }
      #news-date {
        font-size: 0.9rem;
        color: var(--accent-color);
        margin-bottom: 40px;
      }
      #news-body img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        margin: 20px 0;
      }
      .back-link {
        display: inline-block;
        margin-top: 60px;
        color: var(--text-color);
        text-decoration: none;
        border-bottom: 1px solid var(--text-color);
      }
    </style>
  </head>
  <body>
    <header><a href="index.html" class="header-logo">Mitweg</a></header>
    <main>
      <div id="news-content">
        <p id="loading">読み込み中...</p>
      </div>
      <a href="index.html" class="back-link">← Back to Home</a>
    </main>

    <script>
      // --- ここを自分のmicroCMSの情報に書き換えて！ ---
      const API_KEY = "x0WcTZuuVrtvUyRHjtRLLDcH80Uw9JDzRMg6";
      const SERVICE_ID = "https://mitweg.microcms.io/api/v1/news";
      // ----------------------------------------------

      async function getNewsDetail() {
        // 1. URLから「?id=xxxx」の部分を取得
        const params = new URLSearchParams(window.location.search);
        const contentId = params.get("id");

        if (!contentId) {
          document.getElementById("news-content").innerHTML =
            "<p>記事が見つかりません（IDなし）。</p>";
          return;
        }

        try {
          // 2. microCMSに特定の記事（ID指定）をリクエスト
          const res = await fetch(
            `https://${SERVICE_ID}.microcms.io/api/v1/news/${contentId}`,
            {
              headers: { "X-MICROCMS-API-KEY": API_KEY },
            },
          );

          if (!res.ok) throw new Error("Network response was not ok");

          const post = await res.json();

          // 3. 画面に表示
          document.getElementById("news-content").innerHTML = `
                          <p id="news-date">${new Date(post.published).toLocaleDateString()}</p>
                          <h1>${post.title}</h1>
                          <div id="news-body">${post.content}</div>
                      `;
        } catch (error) {
          console.error(error);
          document.getElementById("news-content").innerHTML =
            "<p>エラーが発生しました。</p>";
        }
      }

      getNewsDetail();
    </script>
  </body>
</html>
